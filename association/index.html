<script>
    function verificaPassword() {
      var passwordInserita = document.getElementById("password-input").value;
  
      // Sostituisci 'tua_password_corretta' con la tua password corretta
      var passwordCorretta = "salandralovers1";
  
      if (passwordInserita === passwordCorretta) {
        // Password corretta, reindirizza a una nuova pagina
        window.location.href = "/association/verbals.html";
      } else {
        // Password errata, apri un popup di errore
        alert("Password errata. Riprova.");
      }
    }
  </script>
