<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport"
        content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
  <meta http-equiv="X-UA-Compatible" content="ie=edge">
  <title>Salandra Lovers</title>
  <link href="https://fonts.googleapis.com/css?family=Roboto:400,700" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/material-design-lite/1.3.0/material.indigo-pink.min.css">
  <link rel="stylesheet" href="/src/css/events.css">
  <link rel="manifest" href="/manifest.json">
  <meta name="msapplication-TileImage" content="/src/images/icons/app-icon-144x144.png">
  <meta name="msapplication-TileColor" content="#fff">
  <meta name="theme-color" content="F1C40F">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-144x144.png" sizes="144x144">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-48x48.png" sizes="48x48">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-96x96.png" sizes="96x96">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-192x192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-57x57.png" sizes="57x57">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-60x60.png" sizes="60x60">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-72x72.png" sizes="72x72">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-76x76.png" sizes="76x76">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-114x114.png" sizes="114x114">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-120x120.png" sizes="120x120">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-152x152.png" sizes="152x152">
  <link rel="apple-touch-icon" href="/src/images/icons/app-icon-180x180.png" sizes="180x180">
</head>
<body>

<div id="app">
  <div class="mdl-layout mdl-js-layout mdl-layout--fixed-header">
    <header class="mdl-layout__header">
      
      <div class="mdl-layout__header-row">
        <!-- Title -->
        <span class="mdl-layout-title">Salandra Lovers</span>
        <!-- Add spacer, to align navigation to the right -->
        <div class="mdl-layout-spacer"></div>
        <!-- Navigation. We hide it in small screens. -->
        <nav class="mdl-navigation mdl-layout--large-screen-only">
          <a class="mdl-navigation__link" href="/">Feed</a>
          <a class="mdl-navigation__link" href="/settings">Impostazioni</a>
          <div class="drawer-option">
            <button class="enable-notifications mdl-button mdl-js-button mdl-button--raised mdl-button--colored mdl-color--accent">
              Attiva Notifiche
            </button>
          </div>
        </nav>
      </div>
    </header>
    <div class="mdl-layout__drawer">
      <span class="mdl-layout-title">Salandra Lovers</span>
      <nav class="mdl-navigation">
        <a class="mdl-navigation__link" href="/">Home</a>
        <a class="mdl-navigation__link" href="/news">News</a>
        <a class="mdl-navigation__link" href="/help">Aiuto</a>
        <div class="drawer-option">
          <button class="enable-notifications mdl-button mdl-js-button mdl-button--raised mdl-button--colored mdl-color--accent">
            Attiva Notifiche
          </button>
        </div>
      </nav>
    </div>
    <main class="mdl-layout__content mat-typography">
      <h5 class="text-center mdl-color-text--primary"><b>Eventi</b></h5>
      <p class="text-center">
          Qui troverai i prossimi eventi nel bosco!
      </p> 
      <div class="event-list">
        <div class="event-banner">
          <div class="event-banner-overlay"></div>
          <img src="/src/images/eremo.jpg" alt="Evento 1">
          <div class="event-details">
              <div class="event-title">Visita all'eremo di Pietraspaccata</div>
              <div class="event-date-time">20/09/2023 - 9:30</div>
              <button class="open-modal">Visualizza Dettagli</button>
          </div>
      </div>
      
          <!-- Altri banner simili... -->
      </div>
  </main>
  
  <div class="modal" id="eventModal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <h2>Visita all'eremo di Pietraspaccata</h2>
        <p>Descrizione dell'evento.</p>
        <button class="set-notification">Avvisami</button> <!-- Tasto "Avvisami" -->
    </div>
</div>

    
<script defer src="/src/js/material.min.js"></script>
<script src="/src/js/promise.js"></script>
<script src="/src/js/fetch.js"></script>
<script src="/src/js/app.js"></script>
<script src="https://cdn.rawgit.com/nwcell/ics.js/master/ics.deps.min.js"></script>
<script src="/src/js/events.js"></script>
</body>
</html>
