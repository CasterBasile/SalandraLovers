<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App del Bosco della Salandra</title>
</head>
<body>
    <h1>Benvenuti nell'App del Bosco della Salandra</h1>
    
    <!-- Form per il caricamento delle foto -->
    <input type="file" id="fileInput">
    <button onclick="uploadPhoto()">Carica Foto</button>
    
    <!-- Container per visualizzare le foto -->
    <div id="photoContainer"></div>
    
    <script>
        function uploadPhoto() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            
            if (file) {
                const storageRef = "https://salandra-lovers-default-rtdb.firebaseio.com/photo.json";
                
                fetch(storageRef, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ [Date.now()]: "URL_DEL_FILE" }) // Sostituisci "URL_DEL_FILE" con l'effettiva URL del file
                }).then(response => {
                    if (response.ok) {
                        console.log("Foto caricata con successo.");
                        displayPhotos();
                    } else {
                        console.error("Errore durante il caricamento della foto.");
                    }
                }).catch(error => {
                    console.error("Errore durante il caricamento della foto:", error);
                });
            }
        }
        
        function displayPhotos() {
            const photoContainer = document.getElementById("photoContainer");
            photoContainer.innerHTML = ""; // Pulisci il container
            
            const storageRef = "https://salandra-lovers-default-rtdb.firebaseio.com/photo.json";
            
            fetch(storageRef)
                .then(response => response.json())
                .then(data => {
                    Object.keys(data).forEach(key => {
                        const url = data[key];
                        const img = document.createElement("img");
                        img.src = url;
                        img.style.maxWidth = "300px";
                        img.style.margin = "10px";
                        photoContainer.appendChild(img);
                    });
                })
                .catch(error => {
                    console.error("Errore durante il recupero delle foto:", error);
                });
        }
        
        // Carica le foto all'avvio della pagina
        window.onload = () => {
            displayPhotos();
        };
    </script>
</body>
</html>
